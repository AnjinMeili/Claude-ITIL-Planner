name: planitil
version: 1.0.0
description: >
  End-to-end project planning and quality-gate system for Claude Code.
  Provides a 12-skill pipeline covering information architecture (7 skills),
  quality gates (5 skills), and persistent memory — plus 6 specialized agents
  — to produce a complete, file-persisted artifact chain from PROJECT.md
  through RELEASE.md. Self-contained; no plugin dependencies required.

author:
  name: planitil contributors
license: Apache-2.0

# Skills directory — Claude Code discovers all skill subdirectories within ./skills/
skills: ./skills/

agents:
  - ./agents/dev-orchestrator.md
  - ./agents/requirements-analyst.md
  - ./agents/architect.md
  - ./agents/code-reviewer.md
  - ./agents/plan-critic-evaluator.md
  - ./agents/release-manager.md
